version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hyperswitch-server
    ports:
      - "5252:5252"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5252
    networks:
      - hyperswitch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5252/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hyperswitch-client
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - hyperswitch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  hyperswitch-network:
    driver: bridge
