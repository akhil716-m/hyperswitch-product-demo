apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperswitch-client
  namespace: hyperswitch-demo
  labels:
    app: hyperswitch-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hyperswitch-client
  template:
    metadata:
      labels:
        app: hyperswitch-client
    spec:
      containers:
      - name: client
        image: ghcr.io/anandkganesh/hs-demo/client:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hyperswitch-client
  namespace: hyperswitch-demo
spec:
  selector:
    app: hyperswitch-client
  ports:
  - port: 80
    targetPort: 8080
    name: http
  type: ClusterIP
